<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Logistics Pro V12.9 - Sheets Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .form-input { width: 100%; background-color: #f8fafc; border: 2px solid #f1f5f9; border-radius: 0.8rem; padding: 0.7rem 0.8rem; font-size: 0.85rem; outline: none; transition: all 0.2s; font-weight: 600; }
        .form-input:focus { border-color: #3b82f6; background-color: #fff; }
        .btn-back-ui { background: #fff; color: #64748b; font-weight: 800; padding: 6px 12px; border-radius: 10px; font-size: 9px; border: 1px solid #e2e8f0; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body class="pb-20">

<header id="main-header" class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
    <div class="max-w-xl mx-auto flex justify-between items-center">
        <h1 class="font-black tracking-tighter text-slate-900 uppercase text-xs">Z-Logistics <span id="db-status" class="text-[8px] text-amber-500 ml-1 italic tracking-widest">● DB</span></h1>
        <div id="header-arqueo" class="text-right flex items-center gap-4">
            <div>
                <div id="h-efectivo" class="text-[10px] font-black text-emerald-600 leading-none">$0</div>
                <div id="h-digital" class="text-[8px] font-bold text-slate-400 uppercase leading-none">Caja $0</div>
            </div>
            <button onclick="verHistorial()" class="bg-slate-900 p-2 rounded-xl text-white font-bold text-xs uppercase">Hist.</button>
        </div>
    </div>
</header>

<main class="p-4 max-w-xl mx-auto">
    <section id="step0" class="step active">
        <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-slate-200 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-[14px] font-black uppercase">N.Pedido</h3>
                <button onclick="sincronizarPedidosDesdeSheets(event)" class="text-emerald-600 font-black text-[9px] bg-emerald-50 px-3 py-2 rounded-xl uppercase border border-emerald-100">🔄 Sincro</button>
                <button onclick="toggleMasivo()" class="text-blue-600 font-black text-[10px] bg-blue-50 px-3 py-1 rounded-full uppercase">Carga</button>
            </div>
            
            <div id="area-masiva" class="hidden mb-4 p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                <p class="text-[8px] font-black text-slate-400 uppercase mb-2">Pega desde Sheets (Nombre, Dir, Tel, Envío, Código, Precio, BIN)</p>
                <textarea id="input-masivo" rows="6" class="form-input text-xs font-mono mb-2" placeholder="Copia el rango de celdas aquí..."></textarea>
                <button onclick="procesarMasivo()" class="w-full bg-blue-600 text-white font-black py-2 rounded-xl text-xs uppercase">Importar Selección</button>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-3">
                <input type="hidden" id="f-edit-id">
                <input type="text" id="f-nombre" placeholder="Nombre" class="form-input col-span-2">
                <input type="text" id="f-direccion" placeholder="Dirección" class="form-input col-span-2">
                <input type="tel" id="f-telefono" placeholder="WhatsApp" class="form-input col-span-1">
                <input type="number" id="f-envio" placeholder="Envío ($)" class="form-input col-span-1">
            </div>
            <div id="contenedor-productos" class="space-y-2"></div>
            <button onclick="agregarFilaProducto()" class="w-full mt-2 text-blue-600 font-black text-[10px] uppercase">+ Añadir Producto</button>
            <button onclick="guardarPedidoFormulario()" class="w-full mt-6 bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-sm">Añadir a la Ruta</button>
        </div>

        <div class="flex justify-between items-center mb-4 px-2">
            <h2 class="text-[9px] font-black text-slate-500 uppercase">Orden de Entrega</h2>
            <button onclick="limpiarTodo()" class="text-red-400 text-[9px] font-bold uppercase">Borrar Todo</button>
        </div>
        <div id="lista-pre-carga" class="space-y-3 mb-8"></div>
        <button id="btn-ir-a-picking" onclick="nextStep(0.5)" class="hidden w-full bg-blue-600 text-white font-black py-6 rounded-3xl shadow-xl sticky bottom-4 uppercase">Iniciar Picking</button>
    </section>

    <section id="step_picking" class="step">
        <h2 class="text-2xl font-black mb-1 uppercase">Picking</h2>
        <div id="lista-picking" class="space-y-3"></div>
        <button id="btn-picking-done" onclick="asignarLetrasFijas(); nextStep(1);" disabled class="w-full mt-10 bg-slate-200 text-slate-400 font-black py-6 rounded-3xl uppercase">Continuar</button>
    </section>

    <section id="step1" class="step">
        <h2 class="text-2xl font-black mb-1 uppercase">Carga Furgón</h2>
        <div id="checklist-furgon" class="space-y-3"></div>
        <button id="btn-start-route" onclick="nextStep(2)" disabled class="w-full mt-10 bg-slate-200 text-slate-400 font-black py-6 rounded-3xl ">CONTINUAR</button>
    </section>

    <section id="step2" class="step">
        <div id="next-delivery-info" class="bg-indigo-500 rounded-[2.5rem] p-8 text-white mb-6 shadow-xl"></div>
        <h3 class="text-xs font-black text-slate-400 uppercase mb-4 ml-2 italic">Próximas paradas</h3>
        <div id="lista-ruta-activa" class="space-y-3"></div>
    </section>

    <section id="step3" class="step">
        <div id="cliente-perfil" class="space-y-4"></div>
        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="llamar()" class="bg-blue-500 text-white py-4 rounded-2xl font-black flex flex-col items-center"><span>📞</span><span class="text-[10px]">LLAMAR</span></button>
            <button onclick="abrirMapa()" class="bg-indigo-500 text-white py-4 rounded-2xl font-black flex flex-col items-center"><span>📍</span><span class="text-[10px]">MAPA</span></button>
        </div>
        <div id="controles-flujo" class="space-y-3"></div>
        <div class="mt-4 flex justify-center">
            <button onclick="moverAlFinal()" class="bg-slate-200 text-slate-600 px-4 py-2 rounded-xl font-black text-[9px] uppercase">Enviar al final de la ruta</button>
        </div>
        <div class="mt-6 flex justify-center">
            <button onclick="cancelarPedido()" class="text-red-400 font-bold text-[9px] uppercase tracking-tighter opacity-60">Cancelar Pedido</button>
        </div>
    </section>

    <section id="step4" class="step">
        <div class="mb-4">
            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-3 ml-2 tracking-widest">Validar Entrega</h3>
            <div id="multi-venta-selector" class="space-y-3 mb-6"></div>
            
            <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100">
                <div class="bg-slate-900 rounded-[2rem] p-6 text-center text-white mb-4">
                    <p class="text-[9px] font-bold opacity-50 uppercase tracking-widest mb-1">Monto a recibir</p>
                    <p id="total-cobro-consolidado" class="text-5xl font-black">$0</p>
                    <p id="envio-detalle-pequeno" class="text-[10px] font-bold text-slate-400 mt-1 uppercase"></p>
                </div>
                
                <div class="space-y-3">
                    <select id="metodo-pago" class="form-input font-bold border-2 border-slate-100 focus:border-blue-500 h-14">
                        <option value="">Selecciona Pago...</option>
                        <option value="Efectivo">💵 Efectivo</option>
                        <option value="Transferencia Dani">CTA RUT (DANI)</option>
                        <option value="Transferencia Lore">CTA RUT (LORE)</option>
                    </select>
                    <input type="number" id="paga-con" oninput="calcularVueltoConsolidado()" placeholder="¿Con cuánto paga?" class="form-input h-14 text-center text-lg">
                    <div id="vuelto-box" class="hidden bg-emerald-500 text-white rounded-2xl p-4 text-center animate-bounce">
                        <p id="vuelto-monto" class="text-xl font-black uppercase"></p>
                    </div>
                </div>
            </div>
        </div>
        <button id="btn-finalizar-todo" onclick="finalizarEntrega()" class="w-full bg-blue-600 text-white font-black py-7 rounded-[2rem] shadow-xl text-lg uppercase tracking-widest">Confirmar Transacción</button>
    </section>

    <section id="step7" class="step">
        <div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-black uppercase">Historial</h2><button onclick="cerrarHistorial()" class="text-blue-600 font-black text-sm uppercase">Cerrar</button></div>
        <div id="lista-historial" class="space-y-3"></div>
    </section>

    <div class="text-center">
        <button id="global-back-btn" onclick="retroceder()" class="btn-back-ui hidden">← VOLVER</button>
    </div>
</main>

<script>
//--- CONFIGURACIÓN DE LINKS DE GOOGLE SHEETS ---
const URL_PRODUCTOS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQxmMtrLlKEH1uQUNmUvQxXUmFJQNQc46rwfOpKMNzJytrGDRxyMjo_S2DhQIDJmXTv1o6G2fvZQZgi/pubhtml?gid=1794389307&single=true_AQUÍ";
const URL_PEDIDOS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQxmMtrLlKEH1uQUNmUvQxXUmFJQNQc46rwfOpKMNzJytrGDRxyMjo_S2DhQIDJmXTv1o6G2fvZQZgi/pub?gid=271238087&single=true&output=csv";


let pedidos = JSON.parse(localStorage.getItem('z_pedidos')) || [];
let historial = JSON.parse(localStorage.getItem('z_historial')) || [];
let sigNum = parseInt(localStorage.getItem('z_sigNum')) || 1;
let currentStep = parseFloat(localStorage.getItem('z_step')) || 0;
let pActualID = localStorage.getItem('z_pActualID') || null;
let baseDeDatosProductos = [];
const ABC = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

// SONIDOS
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type === 'scanner') {
        osc.frequency.setValueAtTime(1800, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
    } else if(type === 'complete') {
        [523.25, 659.25, 783.99].forEach((f, i) => {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(f, audioCtx.currentTime + (i*0.1));
            g.gain.setValueAtTime(0.1, audioCtx.currentTime + (i*0.1));
            o.start(audioCtx.currentTime + (i*0.1)); o.stop(audioCtx.currentTime + 0.4);
        });
    }
}

// --- LOGICA CORE ---
function save() {
    localStorage.setItem('z_pedidos', JSON.stringify(pedidos));
    localStorage.setItem('z_historial', JSON.stringify(historial));
    localStorage.setItem('z_sigNum', sigNum);
    localStorage.setItem('z_step', currentStep);
    localStorage.setItem('z_pActualID', pActualID);
    actualizarArqueoHeader();
}

function asignarLetrasFijas() {
    pedidos.forEach((p, i) => { if(!p.letra) p.letra = ABC[i % 26]; });
    save();
}

function retroceder() {
    if (currentStep === 0.5) nextStep(0);
    else if (currentStep === 1) nextStep(0.5);
    else if (currentStep === 2) nextStep(1);
    else if (currentStep === 3) nextStep(2);
    else if (currentStep === 4) nextStep(3);
    else if (currentStep === 7) cerrarHistorial();
}

function nextStep(n) {
    currentStep = n; save();
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    const stepEl = document.getElementById(n === 0.5 ? 'step_picking' : `step${n}`);
    if(stepEl) stepEl.classList.add('active');
    document.getElementById('main-header').style.display = (n === 0) ? 'block' : 'none';
    const backBtn = document.getElementById('global-back-btn');
    if(n === 0) backBtn.classList.add('hidden'); else backBtn.classList.remove('hidden');
    
    if(n === 0) renderStep0();
    if(n === 0.5) renderPicking();
    if(n === 1) renderChecklistCarga();
    if(n === 2) renderStep2();
    if(n === 3) renderStep3();
    if(n === 4) renderVistaUnificada();
    window.scrollTo(0,0);
}

function toggleMasivo() { document.getElementById('area-masiva').classList.toggle('hidden'); }

// --- LÓGICA DE CARGA MASIVA (ESTILO SHEETS) ---
function procesarMasivo() {
    const raw = document.getElementById('input-masivo').value.trim();
    if(!raw) return;

    const lineas = raw.split('\n');
    let ultimoPedido = null;

    lineas.forEach(linea => {
        const d = linea.split('\t');
        
        // Si d[0] (Nombre) tiene texto, es un NUEVO CLIENTE
        if (d[0] && d[0].trim() !== "") {
            ultimoPedido = {
                id: Date.now() + Math.random(),
                nPedido: sigNum++,
                cliente: d[0].trim(),
                direccion: d[1].trim(),
                telefono: d[2].trim(),
                envio: parseInt(d[3]) || 0,
                items: [{
                    desc: d[4].trim().toUpperCase(),
                    precio: parseInt(d[5]) || 0,
                    bin: d[6] ? d[6].trim().toUpperCase() : 'S/U'
                }],
                estado: 'pendiente',
                letra: null
            };
            pedidos.push(ultimoPedido);
        } 
        // Si d[0] está vacío pero d[4] (Código) tiene texto, es PRODUCTO ADICIONAL para el anterior
        else if (ultimoPedido && d[4] && d[4].trim() !== "") { 
            ultimoPedido.items.push({
                desc: d[4].trim().toUpperCase(),
                precio: parseInt(d[5]) || 0,
                bin: d[6] ? d[6].trim().toUpperCase() : 'S/U'
            });
        }
    });

    document.getElementById('input-masivo').value = ""; 
    toggleMasivo(); 
    save(); 
    renderStep0();
}

function agregarFilaProducto(codigo='', precio='', bin='') {
    const div = document.createElement('div');
    div.className = "fila-producto bg-slate-50 p-3 rounded-xl flex flex-col gap-2 border border-slate-100";
    div.innerHTML = `
        <div class="grid grid-cols-2 gap-2">
            <input type="text" placeholder="Código" class="f-codigo form-input !bg-white !p-2 uppercase" value="${codigo}">
            <input type="number" placeholder="Precio ($)" class="f-precio form-input !bg-white !p-2" value="${precio}">
        </div>
        <div class="flex gap-2">
            <input type="text" placeholder="BIN" class="f-bin form-input !bg-white !p-2 uppercase" value="${bin}">
            <button onclick="this.parentElement.parentElement.remove()" class="text-red-400 font-bold px-2">✕</button>
        </div>`;
    document.getElementById('contenedor-productos').appendChild(div);
}

function renderStep0() {
    const lista = document.getElementById('lista-pre-carga');
    lista.innerHTML = pedidos.map((p, i) => `
        <div class="bg-white p-4 rounded-2xl border border-slate-200 flex items-center gap-3 shadow-sm" data-id="${p.id}">
            <div class="bg-slate-900 text-white w-10 h-10 rounded-xl flex items-center justify-center font-black">${p.letra || ABC[i % 26]}</div>
            <div class="flex-1">
                <h4 class="font-bold text-sm uppercase leading-none">${p.cliente} <span class="text-blue-500 ml-1"></span></h4>
                <div class="flex items-center gap-2 mt-1">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">${p.direccion}</p>
                    <span class="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded text-[8px] font-black">${p.items.length} PROD</span>
                </div>
            </div>
            <div class="flex gap-1">
                <button onclick="editarPedido(${p.id})" class="p-2 text-slate-400">✏️</button>
                <button onclick="eliminarPedido(${p.id})" class="p-2 text-red-200">🗑️</button>
            </div>
        </div>`).join('');
    document.getElementById('btn-ir-a-picking').classList.toggle('hidden', pedidos.length === 0);
}

function guardarPedidoFormulario() {
    const editId = document.getElementById('f-edit-id').value;
    const nombre = document.getElementById('f-nombre').value.trim();
    const direccion = document.getElementById('f-direccion').value.trim();
    const telefono = document.getElementById('f-telefono').value.trim();
    const envio = parseInt(document.getElementById('f-envio').value) || 0;
    let items = [];
    document.querySelectorAll('.fila-producto').forEach(fila => {
        const c = fila.querySelector('.f-codigo').value.trim();
        const p = parseInt(fila.querySelector('.f-precio').value) || 0;
        const b = fila.querySelector('.f-bin').value.trim() || 'S/U';
        if(c) items.push({ desc: c.toUpperCase(), precio: p, bin: b });
    });
    if(!nombre || !direccion) return alert("Nombre y Dirección obligatorios");
    if(editId) {
        let idx = pedidos.findIndex(p => p.id == editId);
        pedidos[idx] = { ...pedidos[idx], cliente: nombre, direccion, telefono, envio, items };
    } else {
        pedidos.push({ id: Date.now(), nPedido: sigNum++, cliente: nombre, direccion, telefono, envio, items, estado: 'pendiente', letra: null });
    }
    resetFormulario(); save(); renderStep0();
}

function editarPedido(id) {
    const p = pedidos.find(x => x.id == id); if(!p) return;
    document.getElementById('f-edit-id').value = p.id;
    document.getElementById('f-nombre').value = p.cliente;
    document.getElementById('f-direccion').value = p.direccion;
    document.getElementById('f-telefono').value = p.telefono;
    document.getElementById('f-envio').value = p.envio;
    document.getElementById('contenedor-productos').innerHTML = "";
    p.items.forEach(it => agregarFilaProducto(it.desc, it.precio, it.bin));
}

function renderPicking() {
    let todosItems = [];
    pedidos.forEach((p, i) => {
        p.letra = ABC[i % 26];
        p.items.forEach(it => todosItems.push({...it, nPedido: p.nPedido, letra: p.letra}));
    });

    const agrupado = todosItems.reduce((acc, it) => {
        const b = it.bin || 'S/U';
        if(!acc[b]) acc[b] = []; acc[b].push(it); return acc;
    }, {});

    let html = '';
    for(const bin in agrupado) {
        html += `<div class="bg-white rounded-2xl overflow-hidden border border-slate-200 mb-4">
            <div class="bg-slate-800 text-white px-4 py-2 text-[10px] font-black uppercase flex justify-between">
                <span>ESTANTE: ${bin}</span><span>${agrupado[bin].length} UNID</span>
            </div>
            <div class="p-2 space-y-2">
                ${agrupado[bin].map(it => `
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl has-[:checked]:opacity-30 transition-all border border-transparent has-[:checked]:border-slate-200">
                        <input type="checkbox" onchange="validarPicking()" class="w-6 h-6 check-picking">
                        <div class="flex-1">
                            <div class="flex justify-between items-center"><span class="text-xs font-black uppercase">${it.desc}</span><span class="bg-indigo-500 text-white w-5 h-5 rounded flex items-center justify-center text-[10px] font-black">${it.letra}</span></div>
                            <span class="text-[8px] text-slate-400 font-bold"></span>
                        </div>
                    </label>`).join('')}
            </div>
        </div>`;
    }
    document.getElementById('lista-picking').innerHTML = html || '<p class="text-center py-10">Sin productos</p>';
    validarPicking();
}

function validarPicking() { playSound('scanner'); const todos = Array.from(document.querySelectorAll('.check-picking')).every(c => c.checked); const btn = document.getElementById('btn-picking-done'); btn.disabled = !todos; btn.className = todos ? "w-full mt-10 bg-blue-600 text-white font-black py-6 rounded-3xl" : "w-full mt-10 bg-slate-200 text-slate-400 font-black py-6 rounded-3xl uppercase"; }

function renderChecklistCarga() {
    document.getElementById('checklist-furgon').innerHTML = pedidos.map((p, i) => `
        <label class="flex items-center gap-4 bg-white p-5 rounded-[2rem] border-2 border-transparent has-[:checked]:border-blue-500 shadow-sm"><input type="checkbox" class="w-6 h-6 check-carga" onchange="validarCarga()"><div class="font-black text-indigo-500 uppercase">${p.letra} - ${p.cliente}</div></label>`).join('');
    document.getElementById('btn-start-route').disabled = true;
}

function validarCarga() { playSound('scanner'); const todos = Array.from(document.querySelectorAll('.check-carga')).every(c => c.checked); const btn = document.getElementById('btn-start-route'); btn.disabled = !todos; btn.className = todos ? "w-full mt-10 bg-blue-600 text-white font-black py-6 rounded-3xl shadow-xl" : "w-full mt-10 bg-slate-200 text-slate-400 font-black py-6 rounded-3xl uppercase"; }

function renderStep2() {
    if(pedidos.length === 0) return nextStep(0);
    const p = pedidos[0];
    document.getElementById('next-delivery-info').innerHTML = `
        <div class="flex justify-between items-start" onclick="abrirPerfil(${p.id})">
            <div>
                <h4 class="text-sm font-black opacity-80 uppercase mb-2 tracking-widest text-white">Próxima Entrega:</h4>
                <h3 class="text-4xl font-black uppercase leading-tight mb-2">${p.cliente}</h3>
                <p class="text-lg font-bold opacity-90 uppercase leading-snug">${p.direccion}</p>
            </div>
            <div class="bg-white text-indigo-600 w-16 h-16 rounded-3xl flex items-center justify-center font-black text-4xl shadow-2xl">${p.letra}</div>
        </div>`;
    document.getElementById('lista-ruta-activa').innerHTML = pedidos.slice(1).map((p) => `<div onclick="abrirPerfil(${p.id})" class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center gap-3 opacity-60"><div class="bg-slate-200 text-slate-500 w-10 h-10 rounded-xl flex items-center justify-center font-black">${p.letra}</div><div class="font-bold text-sm uppercase">${p.cliente}</div></div>`).join('');
}

function renderStep3() {
    const p = pedidos.find(x => x.id == pActualID); if(!p) return nextStep(2);
    document.getElementById('cliente-perfil').innerHTML = `
        <div class="bg-white rounded-[3rem] p-8 shadow-sm border border-slate-100">
            <div class="flex flex-col items-center text-center mb-8">
                <div class="w-24 h-24 bg-slate-900 text-white rounded-[2rem] flex items-center justify-center font-black text-6xl shadow-2xl mb-6">${p.letra}</div>
                <h2 class="text-5xl font-black uppercase leading-tight mb-4 tracking-tighter">${p.cliente}</h2>
                <p class="text-2xl font-bold text-slate-600 uppercase leading-snug px-4">${p.direccion}</p>
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl text-[10px] text-slate-400 font-bold space-y-1 border border-slate-100 opacity-60">
                <p class="text-[8px] uppercase tracking-widest mb-1">Productos del pedido:</p>
                ${p.items.map(it => `<div class="flex justify-between"><span>• ${it.desc}</span> <span>$${it.precio.toLocaleString()}</span></div>`).join('')}
            </div>
        </div>`;

    const ctrl = document.getElementById('controles-flujo');
    if(p.estado === 'pendiente') { 
        ctrl.innerHTML = `<button onclick="cambiarEstado('en-camino')" class="w-full bg-slate-900 text-white font-black py-6 rounded-3xl uppercase">Ir a domicilio</button>`; 
    } else { 
        ctrl.innerHTML = `<button onclick="nextStep(4)" class="w-full bg-blue-600 text-white font-black py-6 rounded-3xl shadow-lg uppercase animate-pulse">Llegué / Entregar</button>`; 
    }
}

function renderVistaUnificada() {
    let p = pedidos.find(x => x.id == pActualID); if(!p) return;
    
    document.getElementById('multi-venta-selector').innerHTML = p.items.map((it, idx) => `
        <label id="item-row-${idx}" class="flex justify-between items-center bg-white p-5 rounded-3xl border-2 border-emerald-500 transition-all shadow-sm">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <input type="checkbox" checked class="w-8 h-8 rounded-full venta-check-consolidado appearance-none border-2 border-emerald-500 checked:bg-emerald-500 transition-all" data-idx="${idx}" onchange="toggleItemVisual(${idx})">
                    <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white font-black text-xs pointer-events-none">✓</span>
                </div>
                <div class="flex flex-col">
                    <span id="label-${idx}" class="font-black uppercase text-sm text-slate-800">📦 ${it.desc}</span>
                    <span id="status-${idx}" class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">Listo para cobro</span>
                </div>
            </div>
            <span class="font-black text-slate-900">$${it.precio.toLocaleString()}</span>
        </label>`).join('');
    
    document.getElementById('envio-detalle-pequeno').innerText = `+ Envío incluído: $${p.envio.toLocaleString()}`;
    recalcularTotalConsolidado();
}

function toggleItemVisual(idx) {
    const check = document.querySelector(`.venta-check-consolidado[data-idx="${idx}"]`);
    const row = document.getElementById(`item-row-${idx}`);
    const label = document.getElementById(`label-${idx}`);
    const status = document.getElementById(`status-${idx}`);
    if(check.checked) {
        row.className = "flex justify-between items-center bg-white p-5 rounded-3xl border-2 border-emerald-500 transition-all shadow-sm";
        label.className = "font-black uppercase text-sm text-slate-800";
        status.innerText = "Listo para cobro";
        status.className = "text-[9px] font-bold text-emerald-500 uppercase tracking-widest";
    } else {
        row.className = "flex justify-between items-center bg-slate-50 p-5 rounded-3xl border-2 border-slate-200 opacity-60 transition-all";
        label.className = "font-black uppercase text-sm text-slate-400 line-through";
        status.innerText = "Se devuelve al furgón";
        status.className = "text-[9px] font-bold text-red-400 uppercase tracking-widest";
    }
    recalcularTotalConsolidado();
}

function recalcularTotalConsolidado() {
    let p = pedidos.find(x => x.id == pActualID); if(!p) return;
    const checks = document.querySelectorAll('.venta-check-consolidado');
    let subtotal = 0;
    checks.forEach(c => { if(c.checked) subtotal += p.items[c.dataset.idx].precio; });
    p.totalFinal = subtotal + p.envio;
    document.getElementById('total-cobro-consolidado').innerText = `$${p.totalFinal.toLocaleString()}`;
    calcularVueltoConsolidado();
}

function calcularVueltoConsolidado() {
    let p = pedidos.find(x => x.id == pActualID); if(!p) return;
    const monto = parseFloat(document.getElementById('paga-con').value) || 0;
    const box = document.getElementById('vuelto-box');
    if(monto >= p.totalFinal && monto > 0) { 
        box.classList.remove('hidden'); 
        document.getElementById('vuelto-monto').innerText = `VUELTO: $${(monto - p.totalFinal).toLocaleString()}`; 
    } else { box.classList.add('hidden'); }
}

function finalizarEntrega() {
    const met = document.getElementById('metodo-pago').value; 
    if(!met) return alert("Selecciona método de pago");
    let p = pedidos.find(x => x.id == pActualID); if(!p) return;
    const checks = document.querySelectorAll('.venta-check-consolidado');
    p.vendidos = [];
    checks.forEach(c => { if(c.checked) p.vendidos.push(p.items[c.dataset.idx]); });
    p.metodoPago = met; p.estado = 'completado';
    p.fechaFinal = new Date().toLocaleDateString();
    p.horaFinal = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    historial.unshift({...p}); 
    pedidos = pedidos.filter(x => x.id != pActualID);
    playSound('complete'); pActualID = null; save();
    if(pedidos.length === 0) verHistorial(); else nextStep(2);
}

function moverAlFinal() { let idx = pedidos.findIndex(x => x.id == pActualID); if (idx !== -1) { const p = pedidos.splice(idx, 1)[0]; pedidos.push(p); save(); pActualID = null; nextStep(2); } }
function abrirPerfil(id) { pActualID = id; nextStep(3); }
function cambiarEstado(est) { let p = pedidos.find(x => x.id == pActualID); if(p) p.estado = est; save(); renderStep3(); }
function cancelarPedido() { if(!confirm("¿Cancelar este pedido?")) return; let p = pedidos.find(x => x.id == pActualID); if(!p) return; p.estado = 'cancelado'; p.fechaFinal = new Date().toLocaleDateString(); p.horaFinal = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); historial.unshift({...p}); pedidos = pedidos.filter(x => x.id != pActualID); pActualID = null; save(); nextStep(pedidos.length > 0 ? 2 : 0); }

function verHistorial() {
    const listaH = document.getElementById('lista-historial');
    listaH.innerHTML = [...pedidos, ...historial].map(h => {
        let colorE = h.estado === 'completado' ? 'text-emerald-500 bg-emerald-50' : (h.estado === 'cancelado' ? 'text-red-400 bg-red-50' : 'text-blue-500 bg-blue-50');
        let prodHtml = (h.estado === 'completado' && h.vendidos) ? h.vendidos.map(it => `<div class="text-[9px] text-emerald-600 font-bold">✓ ${it.desc}</div>`).join('') : h.items.map(it => `<div class="text-[9px] text-slate-400 font-medium">• ${it.desc}</div>`).join('');
        const monto = h.totalFinal || (h.items.reduce((acc, it) => acc + it.precio, 0) + (h.envio || 0));
        return `<div class="bg-white p-4 rounded-2xl border border-slate-100 mb-2 shadow-sm"><div class="flex justify-between items-start mb-1"><div><span class="px-2 py-0.5 rounded-full text-[7px] font-black uppercase ${colorE}">${h.estado || 'Pendiente'} • ${h.fechaFinal || 'Hoy'} ${h.horaFinal || ''}</span><h4 class="font-bold uppercase text-xs mt-1">${h.cliente}</h4></div><span class="text-[9px] font-black text-slate-300">#${h.nPedido}</span></div><p class="text-[8px] text-slate-400 font-bold uppercase mb-2">📍 ${h.direccion}</p><div class="my-2 border-l-2 border-slate-100 pl-2">${prodHtml}</div><div class="flex justify-between items-end mt-2 pt-2 border-t border-dashed border-slate-100"><span class="text-[8px] text-slate-300 font-black uppercase italic">${h.metodoPago || '---'}</span><span class="font-black text-slate-700 text-sm">$${monto.toLocaleString()}</span></div></div>`;
    }).join('') || '<p class="text-center text-slate-400 py-10 text-xs italic">Vacío</p>';
    nextStep(7);
}

function actualizarArqueoHeader() {
    let efec = 0, digi = 0;
    historial.forEach(h => { if(h.estado === 'completado') { if(h.metodoPago === 'Efectivo') efec += h.totalFinal; else digi += h.totalFinal; } });
    document.getElementById('h-efectivo').innerText = `EFECTIVO $${efec.toLocaleString()}`;
    document.getElementById('h-digital').innerText = `Digital $${digi.toLocaleString()}`;
}
function cerrarHistorial() { nextStep(pedidos.length > 0 ? 2 : 0); }
function resetFormulario() { document.getElementById('f-edit-id').value = ""; document.getElementById('f-nombre').value = ""; document.getElementById('f-direccion').value = ""; document.getElementById('f-telefono').value = ""; document.getElementById('f-envio').value = ""; document.getElementById('contenedor-productos').innerHTML = ""; agregarFilaProducto(); }
function eliminarPedido(id) { if(confirm("¿Eliminar?")) { pedidos = pedidos.filter(x => x.id != id); save(); renderStep0(); } }
function limpiarTodo() { if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }
function llamar() { let p = pedidos.find(x => x.id == pActualID); if(p) window.location.href = `tel:${p.telefono}`; }
function abrirMapa() { let p = pedidos.find(x => x.id == pActualID); if(p) window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.direccion)}`); }

window.onload = () => { if(currentStep > 0) nextStep(currentStep); else renderStep0(); actualizarArqueoHeader(); };

Sortable.create(document.getElementById('lista-pre-carga'), { animation: 200, onEnd: () => {
    let nuevos = []; document.querySelectorAll('#lista-pre-carga > div').forEach(el => nuevos.push(pedidos.find(p => p.id == el.dataset.id)));
    pedidos = nuevos; save(); renderStep0();
}});
agregarFilaProducto();

// Función auxiliar para buscar en la DB
function buscarEnDB(codigo) {
    return baseDeDatosProductos.find(p => p.codigo === codigo.toUpperCase()) || null;
}

// 2. FUNCIÓN DE SINCRONIZACIÓN DE PEDIDOS (La que pediste)
async function sincronizarPedidosDesdeSheets(event) {
    if(!confirm("¿Sincronizar pedidos desde Google Sheets?")) return;
    
    try {
        console.log("--- INICIANDO SINCRONIZACIÓN ---");
        const respuesta = await fetch(URL_PEDIDOS_CSV);
        let textoFull = await respuesta.text();
        
        // LIMPIEZA INICIAL: Quitamos el BOM (carácter invisible que suele ensuciar el primer dato)
        textoFull = textoFull.replace(/^\uFEFF/, '');
        
        console.log("Contenido bruto recibido:", textoFull);

        const filas = textoFull.split(/\r?\n/).filter(linea => linea.trim() !== "");
        const datos = filas.slice(1); // Saltamos la cabecera
        
        if (datos.length === 0) {
            console.warn("No se encontraron filas de datos después de la cabecera.");
            return;
        }

        const separador = datos[0].includes(',') ? ',' : ';';
        console.log("Separador detectado:", separador);

        let ultimoPedido = null;
        let count = 0;

        datos.forEach((linea, index) => {
            // Limpieza profunda de cada celda
            const d = linea.split(separador).map(celda => celda.trim().replace(/^"|"$/g, ''));
            
            console.log(`Fila ${index + 2} procesada:`, d);

            const nombreCliente = d[0];
            const cod = d[4]?.toUpperCase();

            if(!cod) {
                console.error(`Fila ${index + 2} descartada: No tiene código en la Columna E`);
                return;
            }

            const dbInfo = buscarEnDB(cod);

            // Verificamos si d[0] realmente tiene contenido
            if (nombreCliente !== "") {
                console.log(`> Nuevo pedido detectado: ${nombreCliente}`);
                ultimoPedido = {
                    id: Date.now() + Math.random(),
                    nPedido: sigNum++,
                    cliente: nombreCliente,
                    direccion: d[1] || '',
                    telefono: d[2] || '',
                    envio: parseInt(d[3]) || 0,
                    items: [{
                        desc: cod,
                        precio: parseInt(d[5]) || dbInfo?.precio || 0,
                        bin: d[6] ? d[6].toUpperCase() : (dbInfo?.bin || 'S/U')
                    }],
                    estado: 'pendiente'
                };
                pedidos.push(ultimoPedido);
                count++;
            } 
            else if (ultimoPedido) {
                console.log(`  + Agregando producto extra [${cod}] a ${ultimoPedido.cliente}`);
                ultimoPedido.items.push({
                    desc: cod,
                    precio: parseInt(d[5]) || dbInfo?.precio || 0,
                    bin: d[6] ? d[6].toUpperCase() : (dbInfo?.bin || 'S/U')
                });
            } else {
                console.warn(`Fila ${index + 2} huérfana: Tiene producto pero no tiene nombre de cliente arriba.`);
            }
        });

        save();
        renderStep0();
        console.log("--- SINCRONIZACIÓN FINALIZADA ---");
        alert(`Sincronización exitosa: ${count} pedidos nuevos.`);
        
    } catch (e) {
        alert("Error crítico. Revisa la consola (F12).");
        console.error("DETALLE DEL ERROR:", e);
    }
}
